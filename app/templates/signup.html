{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Gadget Soko Kenya</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="signin-container">
    <h1>Create Account</h1>
    
     <div class="logo">
      <a href="{% url 'login' %}">
        <img src="{% static 'images/logo.png' %}">
      </a>
    </div>
    <p class="subtitle">Sign up as a client to start shopping</p>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    </div>
    {% endif %}

    <div class="login-container">

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <label for="username">Username</label>
        <input type="text" name="username" id="username" placeholder="Enter your username" required>

        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Enter your email" required>

        <label for="phone">Phone Number</label>
        <input type="text" name="phone" id="phone" placeholder="Enter your phone number" required>

        <label for="password1">Password</label>
        <input type="password" name="password1" id="password1" placeholder="Enter your password" required>

        <label for="password2">Confirm Password</label>
        <input type="password" name="password2" id="password2" placeholder="Confirm your password" required>

        <button type="submit">Sign Up</button>
    </form>

    <p class="register-link">
        Already have an account? <a href="{% url 'login' %}">Sign in here</a>
    </p>
</div>
</div>

</body>
</html>
