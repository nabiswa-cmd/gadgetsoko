{%load static%}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
    body {
        font-family: Arial;

        /* Background image */
        background: url("{% static 'images/userlog.png' %}") no-repeat center center fixed;
        background-size: cover;

        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    /* Dark overlay for readability */
    body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
        z-index: 0;
    }

    .container {
        position: relative;
        z-index: 1;

        background: white;
        padding: 30px;
        width: 300px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        border-radius: 10px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
    }

    button {
        width: 100%;
        padding: 10px;
        background: black;
        color: white;
        border: none;
        cursor: pointer;
    }

    .google-btn {
        background: red;
        margin-top: 10px;
    }

    a {
        display: block;
        text-align: center;
        margin-top: 10px;
        text-decoration: none;
        color: black;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <a href="/accounts/google/login/">
        <button class="google-btn">Login with Google</button>
    </a>

    <a href="/usersignup/">Don't have an account? Sign up</a>
</div>

</body>
</html>
