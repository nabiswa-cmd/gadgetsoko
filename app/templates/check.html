{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | Gadget Soko Kenya</title>

<link rel="stylesheet" href="{% static 'css/index.css' %}">

<style>
/* Container */
.checkout-container{
    width:90%;
    max-width:1000px;
    margin:40px auto;
    background:white;
    padding:30px 40px;
    border-radius:8px;
    box-shadow:0 2px 12px rgba(0,0,0,0.1);
}

/* Cart Items */
.cart-item{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    padding:12px 0;
    font-size:16px;
}

/* Total */
.total{
    font-size:22px;
    font-weight:bold;
    margin-top:20px;
    text-align:right;
    color:#0f4c81;
}

/* Form Inputs */
form h3{
    margin-top:30px;
    color:#0f4c81;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin:8px 0 15px 0;
    border:1px solid #ccc;
    border-radius:4px;
    font-size:14px;
}

button{
    background:#0f4c81;
    color:white;
    border:none;
    padding:12px;
    font-size:16px;
    cursor:pointer;
    border-radius:4px;
    width:100%;
}

button:hover{
    background:#08345a;
}

/* Payment Options */
.payment-options{
    display:flex;
    gap:20px;
    margin-bottom:15px;
}

.payment-options label{
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="topbar">
        <div>Language</div>
        <div>
            <a href="{% url 'login' %}">Login</a> |
            <a href="#contact">Contact</a>
        </div>
    </div>
    <div class="navbar">
        <div class="logo">
            <a href="{% url 'index' %}"><img src="{% static 'images/logo.png' %}"></a>
        </div>
        <nav class="menu">
            <a href="{% url 'index' %}">Home</a>
            <a href="{% url 'products' %}">Products</a>
            <a href="#services">Services</a>
            <a href="#contact">Contact</a>
        </nav>
        <div class="cart">
            <a href="{% url 'cart' %}">🛒</a>
        </div>
    </div>
</header>

<!-- CHECKOUT -->
<div class="checkout-container">

<h2>Checkout</h2>

<div id="cartItems"></div>

<div class="total">
Total: KSh <span id="cartTotal">0</span>
</div>

<form method="POST">
    {% csrf_token %}
    <input type="hidden" name="items" id="itemsInput">
    <input type="hidden" name="total" id="totalInput">

    <h3>Customer Details</h3>
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email Address" required>
    <input type="text" name="phone" placeholder="Phone Number" required>
    <textarea name="address" placeholder="Delivery Address" required></textarea>

    <h3>Payment Method</h3>
    <div class="payment-options">
        <label><input type="radio" name="payment_method" value="card" disabled> Card (coming soon)</label>
        <label><input type="radio" name="payment_method" value="mpesa" checked> M-Pesa</label>
        <label><input type="radio" name="payment_method" value="paypal" disabled> PayPal (coming soon)</label>
    </div>

    <button type="submit">Place Order & Pay via M-Pesa</button>
</form>

</div>

<script>
// Load cart from localStorage
let cart = JSON.parse(localStorage.getItem("guestCart")) || [];
let cartItems = document.getElementById("cartItems");
let total = 0;

// Display cart items
cart.forEach(item => {
    total += parseFloat(item.price);
    cartItems.innerHTML += `
    <div class="cart-item">
        <span>${item.name}</span>
        <span>KSh ${item.price}</span>
    </div>
    `;
});

// Set total and form hidden inputs
document.getElementById("cartTotal").innerText = total;
document.getElementById("itemsInput").value = JSON.stringify(cart);
document.getElementById("totalInput").value = total;
</script>

</body>
</html>
