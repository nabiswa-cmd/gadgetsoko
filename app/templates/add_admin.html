{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="add-admin-wrapper">
    <div class="add-admin-card">
        <h2>Add New Admin</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" novalidate>
            {% csrf_token %}
            
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" placeholder="Enter username" required>

            <label for="id_email">Email</label>
            <input type="email" name="email" id="id_email" placeholder="Enter email" required>

            <button type="submit" class="btn">Add Admin</button>
        </form>

        <p class="note">Default password for new admins: <strong>bugbugGADGET</strong></p>
    </div>
</div>

<style>
/* Container centering */
.add-admin-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    background: #f4f6f9;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Card */
.add-admin-card {
    background: #fff;
    padding: 30px 40px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 450px;
    transition: transform 0.2s;
}

.add-admin-card:hover {
    transform: translateY(-3px);
}

/* Card Header */
.add-admin-card h2 {
    color: #0d6efd;
    text-align: center;
    margin-bottom: 25px;
}

/* Form Labels */
.add-admin-card label {
    display: block;
    margin-bottom: 5px;
    font-weight: 600;
    color: #333;
}

/* Form Fields */
.add-admin-card input {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
    transition: border-color 0.2s;
    font-size: 14px;
}

.add-admin-card input:focus {
    border-color: #0d6efd;
    outline: none;
    box-shadow: 0 0 5px rgba(13,110,253,0.3);
}

/* Submit Button */
.add-admin-card .btn {
    width: 100%;
    padding: 12px;
    background-color: #0d6efd;
    border: none;
    border-radius: 5px;
    color: #fff;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.2s, transform 0.2s;
}

.add-admin-card .btn:hover {
    background-color: #0b5ed7;
    transform: translateY(-2px);
}

/* Note */
.add-admin-card .note {
    font-size: 13px;
    color: #555;
    margin-top: 15px;
    text-align: center;
}

/* Alert Messages */
.alert {
    padding: 10px 15px;
    border-radius: 5px;
    margin-bottom: 15px;
    font-size: 14px;
}

.alert.success {
    background-color: #d1e7dd;
    color: #0f5132;
    border: 1px solid #badbcc;
}

.alert.error {
    background-color: #f8d7da;
    color: #842029;
    border: 1px solid #f5c2c7;
}
</style>
{% endblock %}
